<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Predictor — KNN</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #21262d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #f7931a;   /* BTC orange */
      --green:   #3fb950;
      --red:     #f85149;
      --green-bg:  rgba(63,185,80,.12);
      --red-bg:    rgba(248,81,73,.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 860px;
      margin: 0 auto 40px;
    }
    .btc-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 20px; color: #fff;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { font-size: .82rem; color: var(--muted); }

    /* ── Grid ── */
    .grid {
      display: grid;
      max-width: 860px;
      margin: 0 auto;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "signal  price"
        "chart   chart"
        "history history";
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; grid-template-areas: "signal" "price" "chart" "history"; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .card-label {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Signal card ── */
    .card-signal  { grid-area: signal; }
    .signal-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .signal-badge.up   { background: var(--green-bg); color: var(--green); }
    .signal-badge.down { background: var(--red-bg);   color: var(--red);   }
    .signal-badge.unknown { background: rgba(139,148,158,.15); color: var(--muted); }
    .signal-arrow { font-size: 1.3rem; }
    .signal-date  { font-size: .8rem; color: var(--muted); }

    /* ── Price card ── */
    .card-price { grid-area: price; }
    .price-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.02em;
    }
    .price-ticker { font-size: .82rem; color: var(--muted); margin-top: 4px; }

    /* ── Chart card ── */
    .card-chart { grid-area: chart; }
    .chart-wrap { position: relative; height: 220px; }

    /* ── History card ── */
    .card-history { grid-area: history; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      padding: 0 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: .75rem;
      font-weight: 600;
    }
    .tag.up   { background: var(--green-bg); color: var(--green); }
    .tag.down { background: var(--red-bg);   color: var(--red);   }
    .icon-check { color: var(--green); font-size: 1rem; }
    .icon-cross { color: var(--red);   font-size: 1rem; }

    /* ── Loading / error ── */
    .loading {
      max-width: 860px; margin: 80px auto;
      text-align: center; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      max-width: 860px; margin: 80px auto;
      background: var(--red-bg);
      border: 1px solid var(--red);
      border-radius: 12px;
      padding: 24px;
      color: var(--red);
    }

    .refresh-note {
      text-align: center;
      color: var(--muted);
      font-size: .74rem;
      margin-top: 28px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <div class="btc-icon">₿</div>
    <div>
      <h1>BTC Predictor</h1>
      <p>Prédiction KNN — hausse ou baisse du jour ?</p>
    </div>
  </header>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Chargement des données et entraînement du modèle…</p>
    </div>
  </div>

  <script>
  const fmt = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });

  async function load() {
    const app = document.getElementById('app');
    try {
      const res  = await fetch('/api/prediction');
      const data = await res.json();

      if (data.status !== 'ok') throw new Error(data.message || 'Erreur inconnue');

      const isUp      = data.today_signal === 1;
      const isUnknown = data.today_signal === null;
      const signalClass = isUnknown ? 'unknown' : (isUp ? 'up' : 'down');
      const signalText  = isUnknown ? '— Inconnu' : (isUp ? '↑ Hausse' : '↓ Baisse');

      const histRows = data.history.map(h => `
        <tr>
          <td>${h.date}</td>
          <td>${fmt.format(h.close)}</td>
          <td><span class="tag ${h.predicted_up ? 'up' : 'down'}">${h.predicted_up ? '↑ Hausse' : '↓ Baisse'}</span></td>
          <td><span class="tag ${h.actual_up ? 'up' : 'down'}">${h.actual_up ? '↑ Hausse' : '↓ Baisse'}</span></td>
          <td>${h.correct ? '<span class="icon-check">✓</span>' : '<span class="icon-cross">✗</span>'}</td>
        </tr>`).join('');

      app.innerHTML = `
        <div class="grid">

          <div class="card card-signal">
            <div class="card-label">Signal du jour</div>
            <div class="signal-badge ${signalClass}">${signalText}</div>
            <div class="signal-date">${data.today_date}</div>
          </div>

          <div class="card card-price">
            <div class="card-label">Prix actuel (clôture)</div>
            <div class="price-value">${fmt.format(data.current_price)}</div>
            <div class="price-ticker">BTC / USD</div>
          </div>

          <div class="card card-chart">
            <div class="card-label">Cours — 30 derniers jours</div>
            <div class="chart-wrap">
              <canvas id="btcChart"></canvas>
            </div>
          </div>

          <div class="card card-history">
            <div class="card-label">Historique des 5 dernières prédictions</div>
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Clôture</th>
                  <th>Prédiction</th>
                  <th>Réalité</th>
                  <th>Résultat</th>
                </tr>
              </thead>
              <tbody>${histRows}</tbody>
            </table>
          </div>

        </div>
        <p class="refresh-note">
          Données rafraîchies toutes les heures · Modèle KNN (données 2018→aujourd'hui)
        </p>`;

      // Chart
      const ctx = document.getElementById('btcChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.chart_dates,
          datasets: [{
            data:          data.chart_prices,
            borderColor:   '#f7931a',
            borderWidth:   2,
            pointRadius:   0,
            tension:       0.3,
            fill:          true,
            backgroundColor: 'rgba(247,147,26,.08)',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: {
            callbacks: { label: ctx => ' ' + fmt.format(ctx.raw) }
          }},
          scales: {
            x: {
              ticks: { color: '#8b949e', maxTicksLimit: 6, font: { size: 11 } },
              grid:  { color: '#21262d' },
            },
            y: {
              ticks: { color: '#8b949e', font: { size: 11 },
                callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) },
              grid:  { color: '#21262d' },
            }
          }
        }
      });

    } catch (err) {
      app.innerHTML = `<div class="error-msg"><strong>Erreur :</strong> ${err.message}</div>`;
    }
  }

  load();
  </script>
</body>
</html>
